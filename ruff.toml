# Ruff configuration file
# Documentation: https://docs.astral.sh/ruff/

# Exclude common directories
exclude = [
    ".git",
    "__pycache__",
    ".venv",
    "venv",
    "build",
    "dist",
    "*.egg-info",
    "0_old",  # Your old code directory
]

# Set the line length (default is 88 for Black compatibility)
line-length = 100

# Assume Python 3.9+ (adjust based on your Python version)
target-version = "py39"

[lint]
# Enable these rule categories:
# - E/W: pycodestyle errors and warnings
# - F: Pyflakes
# - I: isort (import sorting)
# - N: pep8-naming
# - D: pydocstyle (docstring conventions)
# - UP: pyupgrade (modern Python syntax)
# - B: flake8-bugbear (common bugs)
# - C90: McCabe complexity
# - ANN: flake8-annotations (type hints)
# - S: flake8-bandit (security)
# - T20: flake8-print (detect print statements)
# - ARG: flake8-unused-arguments
# - PTH: flake8-use-pathlib (prefer pathlib over os.path)
# - ERA: eradicate (commented-out code)
# - PL: Pylint
# - RUF: Ruff-specific rules
select = [
    "E",    # pycodestyle errors
    "W",    # pycodestyle warnings
    "F",    # Pyflakes
    "I",    # isort
    "N",    # pep8-naming
    "D",    # pydocstyle (docstrings)
    "UP",   # pyupgrade
    "B",    # flake8-bugbear
    "C90",  # McCabe complexity
    "ANN",  # flake8-annotations
    "S",    # flake8-bandit
    "T20",  # flake8-print
    "ARG",  # flake8-unused-arguments
    "PTH",  # flake8-use-pathlib
    "ERA",  # eradicate
    "PL",   # Pylint
    "RUF",  # Ruff-specific
]

# Ignore specific rules that might be too strict initially
ignore = [
    "D202",   # No blank lines allowed after function docstring
    "D212",   # Multi-line docstring summary should start at the first line
    "ANN101", # Missing type annotation for self
    "ANN102", # Missing type annotation for cls
    "ANN401", # Dynamically typed expressions (Any) are disallowed
    "S101",   # Use of assert detected (OK for tests)
    "T20",    # flake8-print - allow print statements
    "PTH",    # flake8-use-pathlib - don't force pathlib usage
]

[lint.per-file-ignores]
# Ignore docstrings in old code and notebooks
"0_old/*" = ["D"]
"notebooks/*" = ["D"]

[lint.mccabe]
# Set maximum complexity (default is 10)
# Functions with complexity > this value will trigger C901
max-complexity = 15  # Start with 15, then lower to 10 as you refactor

[lint.pydocstyle]
# Use Google-style docstrings (you can also choose "numpy" or "pep257")
convention = "google"

[lint.pylint]
# Maximum number of arguments for a function
max-args = 12  # Default is 5, but data science code often needs more

# Maximum number of local variables
max-locals = 20  # Default is 15

# Maximum number of branches
max-branches = 15  # Default is 12

[format]
# Use Black-compatible formatting
quote-style = "double"
indent-style = "space"
line-ending = "auto"
